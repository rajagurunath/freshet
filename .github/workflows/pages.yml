name: Deploy landing page (GitHub Pages)

# Publishes the static marketing site in apps/web to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
# Site URL: https://<owner>.github.io/<repo>/  (e.g. https://rajagurunath.github.io/freshet/)
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (apps/web)
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
