name: Release desktop app

# Builds the Freshet desktop app for macOS (universal), Windows, and Linux and
# attaches the installers to a GitHub Release. Trigger by pushing a tag `v*`
# (e.g. `git tag v0.1.0 && git push origin v0.1.0`) or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create the release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon + Intel in one universal build
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04 # .AppImage + .deb
            target: ""
            rust-targets: ""
          - platform: windows-latest # .msi + NSIS .exe
            target: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libgtk-3-dev

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build + publish (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-dev.{0}', github.run_number) }}
          releaseName: "Freshet ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseBody: |
            Freshet desktop app — one memory for every AI coding session.

            Download the build for your OS below:
            - **macOS**: `Freshet_*_universal.dmg` (Apple Silicon + Intel)
            - **Windows**: `Freshet_*_x64-setup.exe` or `.msi`
            - **Linux**: `freshet_*_amd64.AppImage` or `.deb`

            The self-hostable central hub is separate — see `deploy/` in the repo.
          releaseDraft: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
