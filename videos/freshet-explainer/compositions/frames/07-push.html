<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- Frame 7 — Push the gold. All runtime content lives inside <template>. -->
  </head>
  <body>
    <template>
      <style>
        /* ---- root (styled via #root, never a class — scoper rule) ---- */
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "JetBrains Mono", monospace;
          color: #1a1815;
        }

        /* ---- full-bleed paper field (its own clip, never on #root) ---- */
        .f07-bg {
          position: absolute;
          inset: 0;
          background: radial-gradient(120% 90% at 42% 40%, #fbfaf8 0%, #f6f3ee 58%, #efebe3 100%);
        }
        .f07-grid {
          position: absolute;
          inset: 0;
          opacity: 0.05;
          background-image:
            repeating-linear-gradient(0deg, rgba(26, 24, 21, 0.5) 0 1px, transparent 1px 88px),
            repeating-linear-gradient(90deg, rgba(26, 24, 21, 0.5) 0 1px, transparent 1px 88px);
        }

        /* ---- stage ---- */
        .f07-stage {
          position: absolute;
          inset: 0;
        }

        /* session cards — dim, supporting */
        .f07-card {
          position: absolute;
          width: 460px;
          height: 84px;
          border-radius: 8px;
          background: #fbfaf8;
          border: 1px solid rgba(26, 24, 21, 0.14);
          box-shadow: 0 1px 3px rgba(26, 24, 21, 0.06);
          display: flex;
          align-items: center;
          padding: 0 28px;
          opacity: 0;
          will-change: transform, opacity;
        }
        .f07-card .f07-lbl {
          font-family: "JetBrains Mono", monospace;
          font-size: 24px;
          font-weight: 500;
          letter-spacing: 0.02em;
          color: rgba(26, 24, 21, 0.55);
        }

        /* the hero card → envelope (single persistent morph container) */
        #f07-morph {
          position: absolute;
          left: 140px;
          top: 478px;
          width: 460px;
          height: 84px;
          border-radius: 8px;
          background: #fbfaf8;
          border: 1.5px solid rgba(26, 24, 21, 0.14);
          box-shadow: 0 1px 3px rgba(26, 24, 21, 0.06);
          overflow: hidden;
          opacity: 0;
          will-change: transform, width, height, border-radius, box-shadow, border-color;
          filter: url(#f07-streak-filter);
        }
        #f07-old,
        #f07-new {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        #f07-old {
          justify-content: flex-start;
          padding: 0 28px;
          opacity: 1;
        }
        #f07-oldlabel {
          font-family: "JetBrains Mono", monospace;
          font-size: 24px;
          font-weight: 500;
          letter-spacing: 0.02em;
          color: rgba(26, 24, 21, 0.55);
        }
        #f07-new {
          opacity: 0;
        }
        #f07-new svg {
          width: 100%;
          height: 100%;
        }

        /* mono chips beneath the envelope */
        .f07-chip {
          position: absolute;
          height: 46px;
          border-radius: 9999px;
          background: #fbfaf8;
          border: 1px solid rgba(26, 24, 21, 0.16);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0 24px;
          opacity: 0;
          will-change: transform, opacity;
        }
        .f07-chip span {
          font-family: "JetBrains Mono", monospace;
          font-size: 24px;
          font-weight: 500;
          letter-spacing: 0.02em;
          color: rgba(26, 24, 21, 0.78);
        }
        #f07-chip1 {
          left: 772px;
          top: 575px;
          width: 176px;
        }
        #f07-chip2 {
          left: 720px;
          top: 631px;
          width: 280px;
        }

        /* rightward hairline path */
        #f07-pathsvg {
          position: absolute;
          inset: 0;
          overflow: visible;
        }
        #f07-path {
          fill: none;
          stroke: rgba(26, 24, 21, 0.32);
          stroke-width: 2;
          stroke-linecap: round;
        }

        /* the hub mark — supporting, entering right edge */
        #f07-hub {
          position: absolute;
          left: 1680px;
          top: 360px;
          width: 120px;
          height: 120px;
          opacity: 0;
          will-change: transform, opacity;
        }
        #f07-hub svg {
          width: 100%;
          height: 100%;
        }
        #f07-hublabel {
          position: absolute;
          left: 0;
          top: 128px;
          width: 100%;
          text-align: center;
          font-family: "JetBrains Mono", monospace;
          font-size: 22px;
          font-weight: 500;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: rgba(26, 24, 21, 0.5);
        }
      </style>

      <div id="root" data-composition-id="07-push" data-width="1920" data-height="1080">
        <!-- full-bleed ground on its own clip layer -->
        <div class="clip f07-bg" data-start="0" data-duration="6" data-track-index="0">
          <div class="f07-grid"></div>
        </div>

        <!-- content stage -->
        <div class="clip f07-stage" data-start="0" data-duration="6" data-track-index="1">
          <!-- inline SVG filter for the envelope's travel streak (Path A, motion-blur-streak) -->
          <svg width="0" height="0" aria-hidden="true" style="position: absolute">
            <defs>
              <filter id="f07-streak-filter" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur id="f07-streak-blur" in="SourceGraphic" stdDeviation="0 0" />
              </filter>
            </defs>
          </svg>

          <!-- rightward hairline path, drawn in Scene 3 -->
          <svg id="f07-pathsvg" viewBox="0 0 1920 1080">
            <path id="f07-path" d="M985,465 Q1340,410 1690,420" />
          </svg>

          <!-- Scene 1: dim session-card column (the hero slot, index 2, is the morph card below) -->
          <div class="f07-card" id="f07-card-0" style="left: 140px; top: 270px">
            <span class="f07-lbl">sess_04.jsonl</span>
          </div>
          <div class="f07-card" id="f07-card-1" style="left: 140px; top: 374px">
            <span class="f07-lbl">sess_11.jsonl</span>
          </div>
          <div class="f07-card" id="f07-card-3" style="left: 140px; top: 582px">
            <span class="f07-lbl">sess_27.jsonl</span>
          </div>
          <div class="f07-card" id="f07-card-4" style="left: 140px; top: 686px">
            <span class="f07-lbl">sess_33.jsonl</span>
          </div>

          <!-- Scene 1→3: the hero card that morphs into the sealed envelope (focal) -->
          <div id="f07-morph">
            <div id="f07-old">
              <span id="f07-oldlabel">sess_19.jsonl</span>
            </div>
            <div id="f07-new">
              <svg viewBox="0 0 230 170" fill="none">
                <path d="M8 8 L115 78 L222 8" stroke="rgba(26,24,21,0.28)" stroke-width="3"
                  stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="115" cy="78" r="9" fill="#F2541B" />
              </svg>
            </div>
          </div>

          <!-- Scene 2: two mono chips, revealed on their cues -->
          <div class="f07-chip" id="f07-chip1"><span>summary</span></div>
          <div class="f07-chip" id="f07-chip2"><span>full transcript</span></div>

          <!-- Scene 3: the hub mark, entering at the right edge -->
          <div id="f07-hub">
            <svg viewBox="0 0 120 120" fill="none">
              <circle cx="60" cy="60" r="40" stroke="rgba(26,24,21,0.30)" stroke-width="2" />
              <circle cx="60" cy="60" r="6" fill="rgba(26,24,21,0.55)" />
              <line x1="60" y1="12" x2="60" y2="22" stroke="rgba(26,24,21,0.30)" stroke-width="2" />
              <line x1="102" y1="84" x2="94" y2="78" stroke="rgba(26,24,21,0.30)" stroke-width="2" />
              <line x1="18" y1="84" x2="26" y2="78" stroke="rgba(26,24,21,0.30)" stroke-width="2" />
            </svg>
            <div id="f07-hublabel">hub</div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* ============================================================
           Frame 7 — Push the gold (6s)
           Scene 1 (0.0–1.5)  five dim session cards; hero card lights
                              (asr-keyword-glow) on "Found gold?"
           Scene 2 (1.5–4.0)  hero lifts + morphs into a sealed envelope
                              (card-morph-anchor); two mono chips reveal
           Scene 3 (4.0–6.0)  hub mark enters; path draws (svg-path-draw);
                              envelope travels with a motion-blur streak,
                              holds unresolved at the hub's doorstep
           ============================================================ */

        /* ---- motion-blur-streak: proxy + seed (Path A) ---- */
        const blurNode = document.getElementById("f07-streak-blur");
        const blurProxy = { v: 0 };
        const writeBlur = () => blurNode.setAttribute("stdDeviation", blurProxy.v + " 0");
        writeBlur(); // seed frame 0 — at rest, no streak

        /* ---- svg-path-draw: measure + seed the hairline path ---- */
        const pathEl = document.getElementById("f07-path");
        const pathLen = pathEl.getTotalLength();
        pathEl.style.strokeDasharray = String(pathLen);
        pathEl.style.strokeDashoffset = String(pathLen);

        /* ---- Scene 1 — cards fade in, dim; hero card among them ---- */
        const OTHER_CARDS = ["#f07-card-0", "#f07-card-1", "#f07-card-3", "#f07-card-4"];
        OTHER_CARDS.forEach((sel, i) => {
          tl.fromTo(
            sel,
            { opacity: 0, y: 16 },
            { opacity: 0.55, y: 0, duration: 0.4, ease: "power3.out" },
            0.14 + i * 0.07
          );
        });
        tl.fromTo(
          "#f07-morph",
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" },
          0.1
        );

        /* ---- asr-keyword-glow (adapted): attack → sustain → release on "Found gold?" ---- */
        // attack 0.45–0.70 — border + shadow ramp to the frame's one coral moment
        tl.to(
          "#f07-morph",
          {
            borderColor: "#F2541B",
            boxShadow: "0 0 26px rgba(242,84,27,0.55)",
            scale: 1.035,
            duration: 0.25,
            ease: "power2.out",
          },
          0.45
        );
        tl.to("#f07-oldlabel", { color: "#F2541B", duration: 0.25, ease: "power2.out" }, 0.45);
        // sustain 0.70–1.30 — held (no tween; values persist)
        // release 1.30–1.55 — settles to the standard soft warm shadow; coral border persists
        // as the object's identity carrying into the morph (the rule's REST_LEVEL breadcrumb).
        tl.to(
          "#f07-morph",
          {
            boxShadow: "0 4px 16px rgba(26,24,21,0.06)",
            scale: 1,
            duration: 0.25,
            ease: "power2.inOut",
          },
          1.3
        );

        /* ---- card-morph-anchor — hero card morphs into the sealed envelope ---- */
        const MORPH_START = 1.55;
        const MORPH_DUR = 0.9;
        // container morph: position via transform (x/y), shape via width/height/radius —
        // avoids ever tweening left/top, so it never fights the streak's own x/y in Scene 3.
        tl.to(
          "#f07-morph",
          { x: 605, y: -103, width: 230, height: 170, borderRadius: 14, duration: MORPH_DUR, ease: "power2.inOut" },
          MORPH_START
        );
        // old content fades in the first 40% of the morph
        tl.to("#f07-old", { opacity: 0, duration: MORPH_DUR * 0.4, ease: "power1.in" }, MORPH_START);
        // new content (envelope glyph) fades in the last 40%
        tl.to(
          "#f07-new",
          { opacity: 1, duration: MORPH_DUR * 0.4, ease: "power1.out" },
          MORPH_START + MORPH_DUR * 0.6
        );
        // the rest of the column recedes — one card lifted, the others stay behind, dim
        OTHER_CARDS.forEach((sel) => {
          tl.to(sel, { opacity: 0.24, duration: MORPH_DUR, ease: "power2.out" }, MORPH_START);
        });

        /* ---- two mono chips, revealed on their spoken cues (per-word reveal) ---- */
        tl.fromTo(
          "#f07-chip1",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" },
          2.6
        );
        tl.fromTo(
          "#f07-chip2",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" },
          3.15
        );

        /* ---- Scene 3 — hub enters, path draws, envelope streaks to the doorstep ---- */
        tl.fromTo(
          "#f07-hub",
          { opacity: 0, x: 40, scale: 0.85 },
          { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "power3.out" },
          4.0
        );
        tl.to("#f07-path", { strokeDashoffset: 0, duration: 0.6, ease: "power2.out" }, 4.0);

        // motion-blur-streak (Path A): position tween and blur envelope share the SAME
        // window + ease so peak-blur coincides with peak-speed and resolves to 0 at the settle.
        const MOVE_START = 4.35;
        const MOVE_DUR = 0.5;
        const MOVE_EASE = "power4.out";
        tl.to("#f07-morph", { x: 1300, y: -133, duration: MOVE_DUR, ease: MOVE_EASE }, MOVE_START);
        tl.fromTo(
          blurProxy,
          { v: 16 },
          { v: 0, duration: MOVE_DUR, ease: MOVE_EASE, onUpdate: writeBlur },
          MOVE_START
        );
        // arrival is deliberately unresolved — hold sharp at the doorstep (≥1s dwell to t=6.0)

        window.__timelines["07-push"] = tl;
      </script>
    </template>
  </body>
</html>
