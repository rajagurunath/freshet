      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* ============================================================
           Frame 8 — The review queue (7.488s)
           Scene 1 (0.0–1.7)   card fades up, still hold — the gate
           Scene 2 (1.7–4.6)   cursor traces + Approve (cursor-click-ripple +
                                press-release-spring) -> 1/2; second reviewer
                                chip lands -> 2/2
           Scene 3 (4.6–7.488) pending pill morphs -> Merged (scale-swap-
                                transition, accent), card absorbed into the
                                hub glyph upper-right, hold still
           Whole-stage #f08-camera gives a subtle two-phase push/pan that
           chases the cursor's targets (blueprint's camera-servo signature).
           ============================================================ */

        /* ---- Scene 1 — card fades up, then a still hold (the gate) ---- */
        tl.fromTo(
          "#f08-card",
          { scale: 0.94, opacity: 0, y: 16 },
          { scale: 1, opacity: 1, y: 0, duration: 0.48, ease: "power3.out" },
          0.0
        );
        tl.fromTo("#f08-meta", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 0.15);
        tl.fromTo("#f08-title", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.25);
        tl.fromTo("#f08-sum1", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 0.45);
        tl.fromTo("#f08-sum2", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 0.58);
        tl.fromTo("#f08-divider", { scaleX: 0 }, { scaleX: 1, duration: 0.35, ease: "power2.out" }, 0.75);
        tl.fromTo("#f08-badge-0", { scale: 0.85, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.4)" }, 0.85);
        tl.fromTo("#f08-approve", { scale: 0.85, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.4)" }, 0.95);
        /* -> held static from ~1.35 to 1.7: the stillness reads as the gate */

        /* ---- Scene 2 — cursor demo: trace, click, approve, second reviewer ---- */
        // camera phase A: subtle push/pan chasing the cursor toward the button
        tl.fromTo(
          "#f08-camera",
          { scale: 1, x: 0, y: 0 },
          { scale: 1.035, x: -14, y: -6, duration: 1.55, ease: "power1.inOut" },
          1.85
        );

        // cursor fades in at its entry point (no motion yet)
        tl.fromTo("#f08-cursor", { opacity: 0 }, { opacity: 1, duration: 0.15, ease: "power2.out" }, 1.7);

        // MOVE 1 — traces summary line 1
        tl.to("#f08-cursor", { x: 60, y: -267, duration: 0.45, ease: "power2.inOut" }, 1.85); // -> 560,433
        // MOVE 2 — sweeps across to summary line 2
        tl.to("#f08-cursor", { x: 400, y: -225, duration: 0.4, ease: "power2.inOut" }, 2.35); // -> 900,475
        // MOVE 3 — settles onto the Approve button
        tl.to("#f08-cursor", { x: 837, y: -135, duration: 0.5, ease: "back.out(1.3)" }, 2.85); // 1337,565

        // CLICK — cursor depresses (cursor-click-ripple)
        tl.to("#f08-cursor", { scale: 0.85, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 }, 3.4);
        // ripple rings expand from the click point
        tl.set(["#f08-ripple-1", "#f08-ripple-2"], { opacity: 1 }, 3.4);
        tl.to(
          ["#f08-ripple-1", "#f08-ripple-2"],
          { scale: 3.4, opacity: 0, duration: 0.55, ease: "power2.out", stagger: 0.09, immediateRender: false },
          3.4
        );

        // button press-release-spring: linear compress -> spring release, state change at release
        tl.to("#f08-approve", { scale: 0.93, duration: 0.12, ease: "power1.in" }, 3.4);
        tl.to("#f08-approve", { scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 3.52);
        // state swap at release: label crossfade + inversion to filled ink + checkmark pop
        tl.to("#f08-approve", { backgroundColor: "#1a1815", duration: 0.3, ease: "power2.out" }, 3.52);
        tl.to("#f08-approve-label-idle", { opacity: 0, duration: 0.22, ease: "power2.in" }, 3.52);
        tl.to("#f08-approve-label-done", { opacity: 1, duration: 0.3, ease: "power2.out" }, 3.58);

        // badge ticks 0 -> 1
        tl.to("#f08-badge-0", { opacity: 0, y: -8, duration: 0.25, ease: "power2.in" }, 3.57);
        tl.fromTo("#f08-badge-1", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }, 3.6);

        // second reviewer avatar chip slides in
        tl.fromTo(
          "#f08-avatar",
          { opacity: 0, scale: 0.6, x: -16 },
          { opacity: 1, scale: 1, x: 0, duration: 0.4, ease: "back.out(1.4)" },
          4.0
        );
        // its check stamps on cue
        tl.fromTo("#f08-avatar-check", { scale: 0 }, { scale: 1, duration: 0.3, ease: "power3.out" }, 4.3);

        // badge ticks 1 -> 2
        tl.to("#f08-badge-1", { opacity: 0, y: -8, duration: 0.25, ease: "power2.in" }, 4.3);
        tl.fromTo("#f08-badge-2", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }, 4.38);
        /* -> held static to 4.6 */

        /* ---- Scene 3 — merge (scale-swap-transition) + absorb into the hub ---- */
        // camera phase B: chase toward the hub before the absorb
        tl.fromTo(
          "#f08-camera",
          { scale: 1.035, x: -14, y: -6 },
          { scale: 1.06, x: -34, y: 8, duration: 1.1, ease: "power2.inOut" },
          5.1
        );

        // status pill morph: outgoing "2 of 2" shrinks+fades, incoming "Merged" pops in accent
        // (starts after badge-2's own entrance settles at 4.68 — no overlap with its fade-in)
        tl.to("#f08-badge-2", { scale: 0.72, opacity: 0, duration: 0.28, ease: "power2.in" }, 4.7);
        tl.fromTo(
          "#f08-badge-merged",
          { scale: 0.72, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(1.6)" },
          4.88
        );

        // absorb: the whole card shrinks and flies up-right toward the hub
        tl.to(
          "#f08-card",
          { scale: 0.12, x: 810, y: -324, duration: 0.5, ease: "power2.inOut" },
          5.48
        );
        tl.to("#f08-card", { opacity: 0, duration: 0.18, ease: "power2.in" }, 5.8);

        // the hub gains one more node — pops in accent, then settles to ink
        tl.fromTo(
          "#f08-hub-dot-new",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.3, ease: "back.out(1.6)" },
          5.8
        );
        tl.to("#f08-hub-line-e", { opacity: 1, duration: 0.3, ease: "power2.out" }, 5.8);
        tl.to("#f08-hub-dot-new", { backgroundColor: "rgba(26,24,21,0.72)", duration: 0.4, ease: "power2.out" }, 6.1);

        /* -> final hold ~6.5 -> 7.488 (~1s): static, the new node settled */

        window.__timelines["08-review-queue"] = tl;
      </script>
